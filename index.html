<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElGamerDeLevante</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* HEADER LOGO */
header {
  text-align: center;
  padding: 20px;
  font-size: 32px;
  font-weight: bold;
  letter-spacing: 2px;
  color: white;
}

header span {
  color: red;
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px 20px;
  background: radial-gradient(circle, #111, black);
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #aaa;
}

/* FIGHTERS */
.fighters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  border-color: red;
}

.card h3 {
  margin: 10px 0;
  color: white;
}

.tag {
  color: red;
  font-size: 12px;
}

/* LIVE BAR */
.livebar {
  text-align: center;
  padding: 10px;
  background: red;
  font-weight: bold;
}

</style>

</head>

<body>

<header>
  EL GAMER DE <span>LEVANTE</span>
</header>

<div class="livebar">
  🔴 MMA LIVE HUB - UFC / MMA STREAMING
</div>

<div class="hero">
  <h1>La mejor acción de MMA en directo</h1>
  
</div>

<div class="fighters">

  <div class="card">
    <div class="tag">CANAL</div>
    <h3>UFC</h3>
    <p>Eventos oficiales de MMA</p>
  </div>

  <div class="card">
    <div class="tag">CANAL</div>
    <h3>PFL</h3>
    <p>Professional Fighters League</p>
  </div>

  <div class="card">
    <div class="tag">CANAL</div>
    <h3>WOW</h3>
    <p>Women of Wrestling / Eventos</p>
  </div>

  <div class="card">
    <div class="tag">CANAL</div>
    <h3>WAR</h3>
    <p>Eventos de combate y lucha</p>
  </div>

</div>
</body> 
</html>

<header>
  EL GAMER DE LEVANTE
</header>

<div class="container">

   <div class="chat">
  <h3>💬 Chat en vivo</h3>
  
  <div id="messages" style="height:200px; overflow:auto; background:#111; padding:10px;"></div>

  <input id="name" placeholder="Nombre" style="width:30%; padding:5px;">
  <input id="message" placeholder="Escribe mensaje..." style="width:50%; padding:5px;">
  <button onclick="sendMessage()">Enviar</button>
</div>

  <div class="matches">

    

  </div>

</div>

</body>

 <script>
const firebaseURL = "https://elgamerdelevante-chat-default-rtdb.europe-west1.firebasedatabase.app/";

function loadMessages() {
  fetch(firebaseURL + "/messages.json")
    .then(res => res.json())
    .then(data => {
      const box = document.getElementById("messages");
      box.innerHTML = "";
      for (let id in data) {
        box.innerHTML += "<p><b>" + data[id].name + ":</b> " + data[id].text + "</p>";
      }
    });
}

function sendMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  fetch(firebaseURL + "/messages.json", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      text: message
    })
  });

  document.getElementById("message").value = "";
}

setInterval(loadMessages, 2000);
</script>
</html>
