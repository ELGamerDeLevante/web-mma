<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Mobile Pro</title>

<style>
body{
margin:0;
background:radial-gradient(circle,#0f0f0f,#000);
font-family:Arial;
overflow:hidden;
touch-action:none;
color:white;
}

canvas{
background:#000;
display:block;
margin:0 auto;
border:2px solid #00ff88;
border-radius:12px;
box-shadow:0 0 30px #00ff88;
}

#ui{
position:fixed;
top:10px;
width:100%;
text-align:center;
font-size:18px;
z-index:10;
}

#startScreen, #gameOver{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:20;
}

button{
padding:12px 20px;
margin-top:10px;
background:#00ff88;
border:none;
border-radius:10px;
font-weight:bold;
}

#joystick{
position:fixed;
bottom:40px;
left:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.05);
border-radius:50%;
border:2px solid rgba(0,255,136,0.3);
touch-action:none;
}

#stick{
width:50px;
height:50px;
background:#00ff88;
border-radius:50%;
position:absolute;
top:35px;
left:35px;
box-shadow:0 0 15px #00ff88;
}
</style>
</head>

<body>

<div id="ui">
🏆 Score: <span id="score">0</span> | ⭐ Best: <span id="best">0</span>
</div>

<div id="startScreen">
<h1>🐍 SNAKE MOBILE PRO</h1>
<button onclick="startGame()">JUGAR</button>
</div>

<div id="gameOver" style="display:none">
<h1>💀 GAME OVER</h1>
<button onclick="restart()">REINTENTAR</button>
</div>

<div id="joystick">
<div id="stick"></div>
</div>

<canvas id="c" width="500" height="500"></canvas>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let snake,food,dx,dy,score,best,loop,speed;

best=localStorage.getItem("bestMobileSnake")||0;
document.getElementById("best").innerText=best;

/* JOYSTICK */
const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

let joy={x:0,y:0,active:false};

/* TOUCH JOYSTICK */
joystick.addEventListener("touchstart",e=>joy.active=true);
joystick.addEventListener("touchend",resetJoy);
joystick.addEventListener("touchmove",moveJoy);

function resetJoy(){
joy={x:0,y:0,active:false};
stick.style.transform="translate(0px,0px)";
}

function moveJoy(e){
let t=e.touches[0];
let rect=joystick.getBoundingClientRect();

let x=t.clientX-rect.left-60;
let y=t.clientY-rect.top-60;

let dist=Math.min(40,Math.hypot(x,y));
let angle=Math.atan2(y,x);

joy.x=Math.cos(angle);
joy.y=Math.sin(angle);

stick.style.transform=`translate(${joy.x*40}px,${joy.y*40}px)`;
}

/* SWIPE CONTROLS */
let startX,startY;

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
let dx2=e.changedTouches[0].clientX-startX;
let dy2=e.changedTouches[0].clientY-startY;

if(Math.abs(dx2)>Math.abs(dy2)){
dx2>0?setDir("right"):setDir("left");
}else{
dy2>0?setDir("down"):setDir("up");
}
});

function startGame(){
document.getElementById("startScreen").style.display="none";
reset();
}

function restart(){
document.getElementById("gameOver").style.display="none";
reset();
}

function reset(){

snake=[{x:10,y:10}];
dx=1;dy=0;
score=0;
speed=120;

foodSpawn();

clearInterval(loop);
loop=setInterval(game,speed);

update();
}

function foodSpawn(){
food={x:Math.floor(Math.random()*25),y:Math.floor(Math.random()*25)};
}

function update(){
document.getElementById("score").innerText=score;

if(score>best){
best=score;
localStorage.setItem("bestMobileSnake",best);
document.getElementById("best").innerText=best;
}
}

function move(){
let head={x:snake[0].x+dx,y:snake[0].y+dy};
snake.unshift(head);

if(head.x===food.x && head.y===food.y){
score++;
navigator.vibrate?.(50);

foodSpawn();

if(speed>60){
speed-=2;
clearInterval(loop);
loop=setInterval(game,speed);
}
}else{
snake.pop();
}
}

function crash(){
let h=snake[0];

if(h.x<0||h.y<0||h.x>=25||h.y>=25) return true;

for(let i=1;i<snake.length;i++){
if(h.x===snake[i].x && h.y===snake[i].y) return true;
}
return false;
}

function setDir(d){
if(d==="up" && dy===0){dx=0;dy=-1;}
if(d==="down" && dy===0){dx=0;dy=1;}
if(d==="left" && dx===0){dx=-1;dy=0;}
if(d==="right" && dy===0){dx=1;dy=0;}
}

function game(){

/* joystick control */
if(joy.active){
if(Math.abs(joy.x)>Math.abs(joy.y)){
setDir(joy.x>0?"right":"left");
}else{
setDir(joy.y>0?"down":"up");
}
}

move();

if(crash()){
navigator.vibrate?.([100,50,100]);
clearInterval(loop);
document.getElementById("gameOver").style.display="flex";
return;
}

ctx.fillStyle="#000";
ctx.fillRect(0,0,500,500);

/* FOOD */
ctx.shadowBlur=20;
ctx.shadowColor="red";
ctx.fillStyle="red";

ctx.beginPath();
ctx.arc(food.x*20+10,food.y*20+10,8,0,Math.PI*2);
ctx.fill();

/* SNAKE */
snake.forEach((s,i)=>{
ctx.shadowBlur=15;
ctx.shadowColor="#00ff88";

ctx.fillStyle=i===0?"#00ff88":"#00cc66";
ctx.fillRect(s.x*20,s.y*20,18,18);
});

update();

}

</script>

</body>
</html>
