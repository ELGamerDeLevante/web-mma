<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElGamerDeLevante | MMA Live</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
}

/* LIVE BAR */
.livebar {
  text-align: center;
  padding: 10px;
  background: red;
  font-weight: bold;
}

/* BOTONES */
.fighters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  padding: 20px;
}

button.card {
  background: #111;
  color: white;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
  cursor: pointer;
  font-size: 16px;
}

button.card:hover {
  border-color: red;
}

/* PLAYER */
#player {
  width: 90%;
  height: 450px;
  display: block;
  margin: 20px auto;
  border: 1px solid #222;
  border-radius: 10px;
}

/* CHAT */
.chat {
  margin: 20px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
}

#messages {
  height: 200px;
  overflow-y: auto;
  background: black;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #222;
}

input {
  padding: 5px;
}

/* LEGAL */
.legal-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  border: none;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
}

#legalModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
}

.modal-box {
  background: #111;
  max-width: 600px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>
  EL GAMER DE <span style="color:red;">LEVANTE</span>
</header>

<div class="livebar">🔴 MMA LIVE</div>

<!-- REPRODUCTOR -->
<iframe id="player" src="" allowfullscreen></iframe>

<!-- BOTONES CANALES -->
<div class="fighters">

  <button class="card" onclick="loadStream('https://www.youtube.com/embed/live_stream?channel=UFC')">
    UFC LIVE
  </button>

  <button class="card" onclick="loadStream('https://www.youtube.com/embed/live_stream?channel=PFL')">
    PFL LIVE
  </button>

  <button class="card" onclick="loadStream('https://www.youtube.com/embed/live_stream?channel=WOW')">
    WOW LIVE
  </button>

  <button class="card" onclick="loadStream('https://www.youtube.com/embed/live_stream?channel=WAR')">
    WAR LIVE
  </button>

</div>

<!-- CHAT -->
<div class="chat">
  <h3>Chat en vivo</h3>
  <div id="messages"></div>
  <input id="name" placeholder="Nombre">
  <input id="message" placeholder="Mensaje">
  <button onclick="sendMessage()">Enviar</button>
</div>

<!-- BOTÓN LEGAL -->
<button class="legal-btn" onclick="openLegal()">Aviso Legal</button>

<!-- MODAL -->
<div id="legalModal">
  <div class="modal-box">
    <h2 style="color:red;">Aviso Legal</h2>
    <p>Este sitio no aloja contenido. Solo muestra enlaces externos.</p>
    <button onclick="closeLegal()" style="background:red;color:white;padding:10px;border:none;border-radius:6px;">
      Cerrar
    </button>
  </div>
</div>

<script>
const firebaseURL = "https://elgamerdelevante-chat-default-rtdb.europe-west1.firebasedatabase.app/";

/* PLAYER */
function loadStream(url) {
  document.getElementById("player").src = url;
}

/* CHAT */
function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const color = (hash & 0x00ffffff).toString(16).toUpperCase();
  return "#" + "00000".substring(0, 6 - color.length) + color;
}

function loadMessages() {
  fetch(firebaseURL + "/messages.json")
    .then(res => res.json())
    .then(data => {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      if (!data) return;

      Object.values(data).forEach(m => {
        const color = getColor(m.name);

        box.innerHTML += `
          <div style="margin:4px 0;padding:6px;background:#111;border-left:3px solid red;">
            <span style="color:${color};font-weight:bold">${m.name}</span>
            <span>: ${m.text}</span>
          </div>
        `;
      });

      box.scrollTop = box.scrollHeight;
    });
}

function sendMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) return;

  fetch(firebaseURL + "/messages.json", {
    method: "POST",
    body: JSON.stringify({ name, text: message })
  });

  document.getElementById("message").value = "";
}

setInterval(loadMessages, 2000);
loadMessages();

/* LEGAL */
function openLegal() {
  document.getElementById("legalModal").style.display = "block";
}

function closeLegal() {
  document.getElementById("legalModal").style.display = "none";
}
</script>

</body>
</html>
