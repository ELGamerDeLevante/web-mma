 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EL GAMER DE LEVANTE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    header {
      background: #111;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: red;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .player {
      width: 100%;
      aspect-ratio: 16/9;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #222;
      margin-bottom: 20px;
      text-align: center;
    }

    .matches {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: #161616;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #222;
    }

    .live {
      color: red;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      cursor: pointer;
      background: white;
      color: black;
      font-weight: bold;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  EL GAMER DE LEVANTE
</header>

<div class="container">

   <div class="chat">
  <h3>💬 Chat en vivo</h3>
  
  <div id="messages" style="height:200px; overflow:auto; background:#111; padding:10px;"></div>

  <input id="name" placeholder="Nombre" style="width:30%; padding:5px;">
  <input id="message" placeholder="Escribe mensaje..." style="width:50%; padding:5px;">
  <button onclick="sendMessage()">Enviar</button>
</div>

  <div class="matches">

    

  </div>

</div>

</body>
 <script>
const firebaseURL = "https://elgamerdelevante-chat-default-rtdb.europe-west1.firebasedatabase.app/";

function loadMessages() {
  fetch(firebaseURL + "/messages.json")
    .then(res => res.json())
    .then(data => {
      const box = document.getElementById("messages");
      box.innerHTML = "";
      for (let id in data) {
        box.innerHTML += "<p><b>" + data[id].name + ":</b> " + data[id].text + "</p>";
      }
    });
}

function sendMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  fetch(firebaseURL + "/messages.json", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      text: message
    })
  });

  document.getElementById("message").value = "";
}

setInterval(loadMessages, 2000);
</script>
</html>
