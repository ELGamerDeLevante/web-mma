<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Neon Pro</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#0f0f0f,#000);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:#00ff88;
    text-shadow:0 0 20px #00ff88;
}

canvas{
    background:#000;
    border:2px solid #00ff88;
    border-radius:12px;
    box-shadow:0 0 25px #00ff88;
}

.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:10px;
    font-size:18px;
}

button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    background:#00ff88;
    color:black;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

#overlay{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

#overlay h1{
    font-size:45px;
}

#gameOver{
    display:none;
    color:red;
    font-size:22px;
    margin-top:10px;
}

.controls{
    display:none;
    margin-top:15px;
}

.controls button{
    width:60px;
    height:60px;
    margin:3px;
    font-size:20px;
}

@media(max-width:768px){
    .controls{display:block;}
}
</style>
</head>

<body>

<div id="overlay">
    <h1>🐍 SNAKE PRO</h1>
    <p>Come, crece y rompe el récord</p>
    <button onclick="start()">JUGAR</button>
</div>

<div class="container">

    <h1>Snake Neon Pro</h1>

    <div class="stats">
        <div>🏆 Score: <span id="score">0</span></div>
        <div>⭐ Best: <span id="best">0</span></div>
    </div>

    <canvas id="game" width="500" height="500"></canvas>

    <div id="gameOver">💀 GAME OVER</div>

    <button onclick="reset()">Reiniciar</button>

    <div class="controls">
        <div>
            <button onclick="dir('up')">⬆️</button>
        </div>
        <div>
            <button onclick="dir('left')">⬅️</button>
            <button onclick="dir('down')">⬇️</button>
            <button onclick="dir('right')">➡️</button>
        </div>
    </div>

</div>

<script>

const c=document.getElementById("game");
const ctx=c.getContext("2d");

let snake,food,dx,dy,score,best,loop,speed;

best=localStorage.getItem("bestSnake")||0;
document.getElementById("best").innerText=best;

/* SONIDOS */
const eatSound=new Audio("https://www.myinstants.com/media/sounds/pop.mp3");
const deadSound=new Audio("https://www.myinstants.com/media/sounds/aww.mp3");

function start(){
document.getElementById("overlay").style.display="none";
reset();
}

function reset(){

snake=[{x:10,y:10}];
dx=1;dy=0;
score=0;
speed=120;

document.getElementById("gameOver").style.display="none";

foodSpawn();

clearInterval(loop);
loop=setInterval(game,speed);

update();
}

function foodSpawn(){
food={
x:Math.floor(Math.random()*25),
y:Math.floor(Math.random()*25)
};
}

function update(){
document.getElementById("score").innerText=score;

if(score>best){
best=score;
localStorage.setItem("bestSnake",best);
document.getElementById("best").innerText=best;
}
}

function move(){
let head={x:snake[0].x+dx,y:snake[0].y+dy};
snake.unshift(head);

if(head.x===food.x && head.y===food.y){
score++;
eatSound.play();
foodSpawn();

/* MÁS VELOCIDAD SUAVE */
if(speed>60){
speed-=2;
clearInterval(loop);
loop=setInterval(game,speed);
}
}else{
snake.pop();
}
}

function crash(){
let h=snake[0];

if(h.x<0||h.y<0||h.x>=25||h.y>=25) return true;

for(let i=1;i<snake.length;i++){
if(h.x===snake[i].x&&h.y===snake[i].y) return true;
}

return false;
}

function game(){

move();

if(crash()){
deadSound.play();
clearInterval(loop);
document.getElementById("gameOver").style.display="block";
return;
}

ctx.fillStyle="#000";
ctx.fillRect(0,0,500,500);

/* FOOD PULSANTE */
let pulse=Math.sin(Date.now()/150)*2;

ctx.shadowBlur=20;
ctx.shadowColor="red";
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(food.x*20+10,food.y*20+10,8+pulse,0,Math.PI*2);
ctx.fill();

/* SNAKE */
snake.forEach((s,i)=>{

ctx.shadowBlur=15;
ctx.shadowColor="#00ff88";

if(i===0){
ctx.fillStyle="#00ff88";
ctx.fillRect(s.x*20,s.y*20,18,18);

ctx.shadowBlur=0;
ctx.fillStyle="black";
ctx.fillRect(s.x*20+5,s.y*20+5,3,3);
ctx.fillRect(s.x*20+12,s.y*20+5,3,3);
}else{
ctx.fillStyle="#00cc66";
ctx.fillRect(s.x*20,s.y*20,18,18);
}
});

}

function dir(d){
if(d==="up"&&dy===0){dx=0;dy=-1;}
if(d==="down"&&dy===0){dx=0;dy=1;}
if(d==="left"&&dx===0){dx=-1;dy=0;}
if(d==="right"&&dx===0){dx=1;dy=0;}
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp")dir("up");
if(e.key==="ArrowDown")dir("down");
if(e.key==="ArrowLeft")dir("left");
if(e.key==="ArrowRight")dir("right");
});

</script>

</body>
</html>
