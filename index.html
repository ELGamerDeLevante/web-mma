<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL GAMER DE LEVANTE</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
}

/* LIVE BAR */
.livebar {
  text-align: center;
  padding: 10px;
  background: red;
  font-weight: bold;
}

/* PANEL INFO */
.fighters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  padding: 18px;
  max-width: 750px;
  margin: auto;
}

.card {
  background: #111;
  color: white;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #222;
  text-align: center;
  font-weight: bold;
  font-size: 15px;
}

/* CHAT */
.chat {
  margin: 20px auto;
  background: #111;
  padding: 15px;
  border-radius: 10px;
  width: calc(100% - 40px);
  max-width: 500px;
  box-sizing: border-box;
}

/* ESTADÍSTICAS */
.chat-stats {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #aaa;
  margin-bottom: 10px;
}

/* MENSAJES */
#messages {
  height: 220px;
  overflow-y: auto;
  background: black;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #222;
  border-radius: 8px;
}

/* INPUTS */
input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #333;
  background: #000;
  color: white;
  width: 100%;
  box-sizing: border-box;
}

/* FILA MENSAJE */
.msg-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

#message {
  flex: 1;
}

/* BOTÓN */
button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: red;
  color: white;
  cursor: pointer;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .chat {
    width: calc(100% - 20px);
  }

  .fighters {
    grid-template-columns: 1fr;
  }
}

/* LEGAL */
.legal-footer {
  text-align: center;
  padding: 25px 0;
}

#legalModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
}

.modal-box {
  background: #111;
  max-width: 500px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  EL GAMER DE <span style="color:red;">LEVANTE</span>
</header>

<div class="livebar">
  🔴 EL GAMER DE LEVANTE / MMA LIVE
</div>

<!-- CHAT -->
<div class="chat">

  <h3>💬 Chat en vivo</h3>

  <div class="chat-stats">
    <div>👀 Espectadores: <span id="viewers">0</span></div>
    <div>👥 Miembros: <span id="membersCount">0</span></div>
  </div>

  <div id="messages"></div>

  <input id="name" placeholder="Nombre">

  <div class="msg-row">
    <input id="message" placeholder="Mensaje">
    <button onclick="sendMessage()">Enviar</button>
  </div>

</div>

<!-- LEGAL -->
<div class="legal-footer">
  <button onclick="openLegal()">Aviso Legal</button>
</div>

<div id="legalModal">
  <div class="modal-box">
    <h2 style="color:red;">Aviso Legal</h2>
    <p>
      Proyecto informativo y de entretenimiento.<br>
      No alojamos contenido propio.
    </p>
    <button onclick="closeLegal()">Cerrar</button>
  </div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  databaseURL:
    "https://elgamerdelevante-chat-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const userId = Math.random().toString(36).substr(2, 9);

/* CHAT */
const messagesRef = db.ref("messages");

messagesRef.on("child_added", (snap) => {
  const m = snap.val();
  const box = document.getElementById("messages");

  const hora = new Date(m.time).toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });

  const div = document.createElement("div");
  div.style.marginBottom = "8px";

  div.innerHTML = `
    <div>
      <b style="color:red">${m.name}</b>
      <span style="color:#777;font-size:12px;">${hora}</span>
    </div>
    <div>${m.text}</div>
  `;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
});

/* ENVIAR MENSAJE */
function sendMessage() {
  const name = document.getElementById("name").value.trim();
  const message = document.getElementById("message").value.trim();

  if (!name || !message) return;

  /* límite caracteres */
  if (message.length > 250) {
    alert("Máximo 250 caracteres");
    return;
  }

  /* filtro básico */
  const allowed = /^[a-zA-ZÀ-ÿ0-9\s.,!?¿¡:;()\-_"'@#%&+=/]*$/;
  if (!allowed.test(message)) {
    alert("El mensaje contiene caracteres no permitidos");
    return;
  }

  messagesRef.push({
    name,
    text: message,
    time: Date.now()
  });

  document.getElementById("message").value = "";
}

/* ENTER */
document.getElementById("message")
.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

/* VIEWERS */
const viewersRef = db.ref("viewers");

viewersRef.child(userId).set(true);
viewersRef.child(userId).onDisconnect().remove();

viewersRef.on("value", snap => {
  const data = snap.val();
  document.getElementById("viewers").innerText =
    data ? Object.keys(data).length : 0;
});

/* MEMBERS */
const membersRef = db.ref("members");

document.getElementById("name")
.addEventListener("change", e => {
  membersRef.child(userId).set({ name: e.target.value });
});

membersRef.child(userId).onDisconnect().remove();

membersRef.on("value", snap => {
  const data = snap.val();
  document.getElementById("membersCount").innerText =
    data ? Object.keys(data).length : 0;
});

/* LEGAL */
function openLegal() {
  document.getElementById("legalModal").style.display = "block";
}

function closeLegal() {
  document.getElementById("legalModal").style.display = "none";
}

</script>

</body>
</html>
