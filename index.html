<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL GAMER DE LEVANTE | MMA LIVE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
}

/* LIVE BAR */
.livebar {
  text-align: center;
  padding: 10px;
  background: red;
  font-weight: bold;
}

/* CATEGORÍAS */
.fighters {
  padding: 20px;
  text-align: center;
  font-size: 16px;
  color: #ccc;
  line-height: 1.8;
  font-weight: bold;
}

/* CHAT */
.chat {
  margin: 20px auto;
  background: #111;
  padding: 15px;
  border-radius: 10px;
  width: calc(100% - 40px);
  max-width: 500px;
  box-sizing: border-box;
}

#messages {
  height: 220px;
  overflow-y: auto;
  background: black;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #222;
  border-radius: 8px;
}

/* inputs */
input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #333;
  background: #000;
  color: white;
  box-sizing: border-box;
}

/* fila mensaje + botón */
.msg-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

/* mensaje ocupa todo */
#message {
  flex: 1;
}

/* botón enviar */
button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: red;
  color: white;
  cursor: pointer;
  white-space: nowrap;
}

/* contador */
.counter {
  margin-bottom: 10px;
  color: #aaa;
  font-size: 14px;
}

/* LEGAL */
.legal-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  border: none;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
}

#legalModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
}

.modal-box {
  background: #111;
  max-width: 600px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}

/* móvil */
@media (max-width: 600px) {
  .chat {
    width: calc(100% - 20px);
    margin: 10px auto;
  }
}
</style>

</head>

<body>

<header>
  EL GAMER DE <span style="color:red;">LEVANTE</span>
</header>

<div class="livebar">
  🔴 EL GAMER DE LEVANTE / MMA LIVE
</div>
<!-- PLAYER YOUTUBE -->
<div class="player" style="width:100%; display:flex; justify-content:center; padding:10px;">
  <iframe
    src="https://www.youtube.com/embed/Im6zFFXNW7k"
    style="width:100%; max-width:900px; height:450px; border:2px solid red; border-radius:10px;"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>
<!-- CATEGORÍAS -->
<div class="fighters">
  MMA / BOXEO / LUCHA / EVENTOS
</div>

<!-- CHAT -->
<div class="chat">
  <h3>💬 Chat en vivo</h3>

  <div class="counter">
    👥 Conectados: <span id="onlineCount">1</span>
  </div>

  <div id="messages"></div>

  <!-- INPUTS -->
  <input id="name" placeholder="Nombre">

  <div class="msg-row">
    <input id="message" placeholder="Mensaje">
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<!-- LEGAL -->
<button class="legal-btn" onclick="openLegal()">Aviso Legal</button>

<div id="legalModal">
  <div class="modal-box">
    <h2 style="color:red;">Aviso Legal</h2>
    <p>Este sitio no aloja contenido, solo chat y enlaces externos.</p>
    <button onclick="closeLegal()">Cerrar</button>
  </div>
</div>

<script>
const firebaseURL = "https://elgamerdelevante-chat-default-rtdb.europe-west1.firebasedatabase.app/";

/* CHAT */
function loadMessages() {
  fetch(firebaseURL + "/messages.json")
    .then(res => res.json())
    .then(data => {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      if (!data) return;

      Object.values(data).forEach(m => {
        box.innerHTML += `
          <div style="margin-bottom:10px;">
            <b style="color:red">${m.name}:</b> ${m.text}
          </div>
        `;
      });

      box.scrollTop = box.scrollHeight;
    });
}

function sendMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) return;

  fetch(firebaseURL + "/messages.json", {
    method: "POST",
    body: JSON.stringify({ name, text: message })
  });

  document.getElementById("message").value = "";
}

/* contador simulado */
let base = 12;

function updateCounter() {
  const variation = Math.floor(Math.random() * 5);
  document.getElementById("onlineCount").innerText = base + variation;
}

setInterval(updateCounter, 4000);
updateCounter();

/* init */
setInterval(loadMessages, 2000);
loadMessages();

/* legal */
function openLegal() {
  document.getElementById("legalModal").style.display = "block";
}

function closeLegal() {
  document.getElementById("legalModal").style.display = "none";
}
</script>

</body>
</html>
