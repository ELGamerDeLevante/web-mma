<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL GAMER DE LEVANTE | MMA LIVE</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
}

.livebar {
  text-align: center;
  padding: 10px;
  background: red;
  font-weight: bold;
}

.player {
  width: calc(100% - 40px);
  max-width: 500px;
  margin: 15px auto;
  display: flex;
  justify-content: center;
}

.chat {
  margin: 20px auto;
  background: #111;
  padding: 15px;
  border-radius: 10px;
  width: calc(100% - 40px);
  max-width: 500px;
}

#messages {
  height: 220px;
  overflow-y: auto;
  background: black;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #222;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #333;
  background: #000;
  color: white;
}

.msg-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

#message {
  flex: 1;
}

button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: red;
  color: white;
  cursor: pointer;
}

.stats {
  text-align: center;
  margin-top: 10px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  EL GAMER DE <span style="color:red;">LEVANTE</span>
</header>

<div class="livebar">
  🔴 MMA LIVE / CHAT EN DIRECTO
</div>

<div class="stats">
  👀 Espectadores: <span id="viewers">0</span> |
  👥 Miembros: <span id="membersCount">0</span>
</div>

<!-- CHAT -->
<div class="chat">
  <h3>💬 Chat en vivo</h3>

  <div id="messages"></div>

  <input id="name" placeholder="Nombre">

  <div class="msg-row">
    <input id="message" placeholder="Mensaje">
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  databaseURL: "https://elgamerdelevante-chat-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* IDs únicos */
const userId = Math.random().toString(36).substr(2, 9);

/* =========================
   💬 CHAT REAL TIME
========================= */

const messagesRef = db.ref("messages");

messagesRef.on("value", (snap) => {
  const data = snap.val();
  const box = document.getElementById("messages");
  box.innerHTML = "";

  if (!data) return;

  Object.values(data).forEach(m => {
    box.innerHTML += `
      <div style="margin-bottom:8px;">
        <b style="color:red">${m.name}:</b> ${m.text}
      </div>
    `;
  });

  box.scrollTop = box.scrollHeight;
});

function sendMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) return;

  messagesRef.push({
    name,
    text: message,
    time: Date.now()
  });

  document.getElementById("message").value = "";
}

/* =========================
   👀 ESPECTADORES
========================= */

const viewersRef = db.ref("viewers");

viewersRef.child(userId).set(true);

window.addEventListener("beforeunload", () => {
  viewersRef.child(userId).remove();
});

viewersRef.on("value", (snap) => {
  const data = snap.val();
  document.getElementById("viewers").innerText =
    data ? Object.keys(data).length : 0;
});

/* =========================
   👥 MIEMBROS
========================= */

const membersRef = db.ref("members");

let username = "Usuario" + Math.floor(Math.random() * 1000);

membersRef.child(userId).set({
  name: username
});

window.addEventListener("beforeunload", () => {
  membersRef.child(userId).remove();
});

membersRef.on("value", (snap) => {
  const data = snap.val();
  document.getElementById("membersCount").innerText =
    data ? Object.keys(data).length : 0;
});
</script>

</body>
</html>
