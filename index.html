<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Neon Pro+ RATS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:radial-gradient(circle,#0f0f0f,#000);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{text-align:center;}

h1{
    color:#00ff88;
    text-shadow:0 0 20px #00ff88;
}

.stats{
    display:flex;
    justify-content:center;
    gap:25px;
    margin:10px;
    font-size:20px;
}

canvas{
    background:#000;
    border:2px solid #00ff88;
    border-radius:15px;
    width:90vmin;
    height:90vmin;
}

button{
    margin-top:10px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    color:black;
    font-weight:bold;
}

/* CONTROLES SIEMPRE VISIBLES */
.controls{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
    align-items:center;
}

.controls .row{
    display:flex;
    gap:10px;
}

.controls button{
    width:65px;
    height:65px;
    font-size:22px;
}
</style>
</head>

<body>

<div class="container">

<h1>Snake Neon Pro+</h1>

<div class="stats">
    <div>Score: <span id="score">0</span></div>
    <div>Record: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<button onclick="startGame()">Reiniciar</button>

<div class="controls">
    <div class="row">
        <button onclick="setDir('up')">⬆️</button>
    </div>
    <div class="row">
        <button onclick="setDir('left')">⬅️</button>
        <button onclick="setDir('down')">⬇️</button>
        <button onclick="setDir('right')">➡️</button>
    </div>
</div>

</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");

let grid=20;
let size=20;

let snake,food,rat;
let dx=1,dy=0;
let score=0;
let best=localStorage.getItem("snakeBest")||0;
bestEl.innerText=best;

let acc=0;
let step=140;
let last=0;

/* RESIZE CORRECTO */
function resize(){
    let s=Math.min(innerWidth,innerHeight)*0.85;
    canvas.width=s;
    canvas.height=s;
    grid=canvas.width/size;
}
resize();
addEventListener("resize",resize);

/* START */
function startGame(){
snake=[{x:10,y:10}];
dx=1;dy=0;
score=0;
spawnFood();
spawnRat();
requestAnimationFrame(loop);
}

/* SPAWN */
function spawnFood(){
food={x:Math.floor(Math.random()*size),y:Math.floor(Math.random()*size)};
}

function spawnRat(){
rat=Math.random()<0.3 ? {x:Math.floor(Math.random()*size),y:Math.floor(Math.random()*size)} : null;
}

/* CONTROL */
let next={x:1,y:0};

function setDir(d){
if(d==="up" && dy===0) next={x:0,y:-1};
if(d==="down" && dy===0) next={x:0,y:1};
if(d==="left" && dx===0) next={x:-1,y:0};
if(d==="right" && dx===0) next={x:1,y:0};
}

/* MOVE */
function move(){
dx=next.x;
dy=next.y;

let h={x:snake[0].x+dx,y:snake[0].y+dy};
snake.unshift(h);

if(h.x===food.x&&h.y===food.y){
score++;
spawnFood();
spawnRat();
}
else if(rat && h.x===rat.x && h.y===rat.y){
score+=3;
spawnRat();
}
else snake.pop();
}

/* COLLISION */
function crash(){
let h=snake[0];
return h.x<0||h.y<0||h.x>=size||h.y>=size||
snake.slice(1).some(s=>s.x===h.x&&s.y===h.y);
}

/* DRAW (GARANTIZADO) */
function draw(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* GRID */
ctx.strokeStyle="rgba(255,255,255,0.05)";
for(let i=0;i<canvas.width;i+=grid){
ctx.beginPath();
ctx.moveTo(i,0);
ctx.lineTo(i,canvas.height);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0,i);
ctx.lineTo(canvas.width,i);
ctx.stroke();
}

/* FOOD */
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(food.x*grid+grid/2,food.y*grid+grid/2,grid/3,0,Math.PI*2);
ctx.fill();

/* RAT */
if(rat){
ctx.fillStyle="gray";
ctx.beginPath();
ctx.arc(rat.x*grid+grid/2,rat.y*grid+grid/2,grid/4,0,Math.PI*2);
ctx.fill();
}

/* SNAKE */
snake.forEach((s,i)=>{
ctx.fillStyle=i===0?"#00ff88":"#00cc66";
ctx.fillRect(s.x*grid,s.y*grid,grid-2,grid-2);
});

scoreEl.innerText=score;
}

/* LOOP */
function loop(t){

requestAnimationFrame(loop);

if(!last) last=t;
acc+=t-last;
last=t;

while(acc>=step){
move();
if(crash()) startGame();
acc-=step;
}

draw();
}

/* INIT */
startGame();

</script>

</body>
</html>
