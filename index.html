<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Neon Pro+ RATS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:radial-gradient(circle,#0f0f0f,#000);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{text-align:center;}

h1{
    color:#00ff88;
    text-shadow:0 0 20px #00ff88;
}

.stats{
    display:flex;
    justify-content:center;
    gap:25px;
    margin:10px;
    font-size:20px;
}

canvas{
    background:#000;
    border:2px solid #00ff88;
    border-radius:15px;
    box-shadow:
        0 0 25px rgba(0,255,136,0.4),
        0 0 70px rgba(0,255,136,0.2);
    width:90vmin;
    height:90vmin;
}

button{
    margin-top:10px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{transform:scale(1.05);}

#startScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#gameOverScreen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}
</style>
</head>

<body>

<div id="startScreen">
    <h1>🐍 SNAKE PRO+ RATS</h1>
    <button onclick="startGame()">JUGAR</button>
</div>

<div id="gameOverScreen">
    <h1>💀 GAME OVER</h1>
    <div id="finalScore"></div>
    <button onclick="startGame()">REINTENTAR</button>
</div>

<div class="container">

<h1>Snake Neon Pro+</h1>

<div class="stats">
    <div>🏆 Score: <span id="score">0</span></div>
    <div>⭐ Récord: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<button onclick="startGame()">Reiniciar</button>

</div>

<script>

/* CANVAS */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const gameOverScreen=document.getElementById("gameOverScreen");
const finalScore=document.getElementById("finalScore");

let grid=20;
let size=25;

/* IMÁGENES */
const imgApple = new Image();
imgApple.src = "https://cdn.pixabay.com/photo/2013/07/12/18/39/apple-153436_1280.png";

const imgRat = new Image();
imgRat.src = "https://cdn.pixabay.com/photo/2016/04/01/11/09/rat-1307645_1280.png";

const imgSnake = new Image();
imgSnake.src = "https://cdn.pixabay.com/photo/2016/03/31/19/56/snake-1296227_1280.png";

/* STATE */
let snake,food,rat,dx,dy,score,best;
let lastTime=0;
let acc=0;
let step=140;

/* BEST */
best=localStorage.getItem("snakeBest")||0;
bestEl.innerText=best;

/* RESIZE */
function resize(){
let s=Math.min(innerWidth,innerHeight)*0.9;
canvas.width=s;
canvas.height=s;
grid=canvas.width/size;
}
resize();
addEventListener("resize",resize);

/* START */
function startGame(){
document.getElementById("startScreen").style.display="none";
gameOverScreen.style.display="none";
reset();
requestAnimationFrame(loop);
}

/* RESET */
function reset(){
snake=[{x:10,y:10}];
dx=1;dy=0;
score=0;
step=140;

spawnFood();
spawnRat();

update();
}

/* FOOD */
function spawnFood(){
food={
x:Math.floor(Math.random()*size),
y:Math.floor(Math.random()*size)
};
}

/* RAT */
function spawnRat(){
rat=null;
if(Math.random()<0.35){
rat={
x:Math.floor(Math.random()*size),
y:Math.floor(Math.random()*size)
};
}
}

/* SCORE */
function update(){
scoreEl.innerText=score;
if(score>best){
best=score;
localStorage.setItem("snakeBest",best);
bestEl.innerText=best;
}
}

/* CONTROL */
let nextDir={x:1,y:0};

function setDir(d){
if(d==="up" && dy===0) nextDir={x:0,y:-1};
if(d==="down" && dy===0) nextDir={x:0,y:1};
if(d==="left" && dx===0) nextDir={x:-1,y:0};
if(d==="right" && dx===0) nextDir={x:1,y:0};
}

function applyDir(){
dx=nextDir.x;
dy=nextDir.y;
}

/* MOVE */
function move(){

let h={x:snake[0].x+dx,y:snake[0].y+dy};
snake.unshift(h);

if(h.x===food.x&&h.y===food.y){
score++;
spawnFood();
spawnRat();
if(step>70) step-=1.2;
}
else if(rat&&h.x===rat.x&&h.y===rat.y){
score+=3;
spawnRat();
}
else snake.pop();
}

/* CRASH */
function crash(){
let h=snake[0];
return h.x<0||h.y<0||h.x>=size||h.y>=size||
snake.slice(1).some(s=>s.x===h.x&&s.y===h.y);
}

/* LOOP */
function loop(time){
requestAnimationFrame(loop);

if(!lastTime) lastTime=time;

acc+=time-lastTime;
lastTime=time;

while(acc>=step){

applyDir();
move();

if(crash()){
finalScore.innerText="Score: "+score;
gameOverScreen.style.display="flex";
return;
}

acc-=step;
}

draw();
}

/* DRAW REAL GRAPHICS */
function draw(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* GRID */
ctx.strokeStyle="rgba(255,255,255,0.05)";
for(let i=0;i<canvas.width;i+=grid){
ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(canvas.width,i);ctx.stroke();
}

/* 🍎 APPLE */
if(imgApple.complete){
ctx.drawImage(
imgApple,
food.x*grid,
food.y*grid,
grid,
grid
);
}

/* 🐀 RAT */
if(rat && imgRat.complete){
ctx.drawImage(
imgRat,
rat.x*grid,
rat.y*grid,
grid,
grid
);
}

/* 🐍 SNAKE */
snake.forEach((s,i)=>{
ctx.drawImage(
imgSnake,
s.x*grid,
s.y*grid,
grid,
grid
);
});

update();
}

</script>

</body>
</html>
