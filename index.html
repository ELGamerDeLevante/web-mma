 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPORT MMA LIVE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    header {
      background: #111;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: red;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .player {
      width: 100%;
      aspect-ratio: 16/9;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #222;
      margin-bottom: 20px;
      text-align: center;
    }

    .matches {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: #161616;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #222;
    }

    .live {
      color: red;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      cursor: pointer;
      background: white;
      color: black;
      font-weight: bold;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  SPORT MMA LIVE
</header>

<div class="container">

  <div class="player">
    AQUÍ PUEDES PEGAR TU STREAM LEGAL (YouTube / Twitch / Kick)
  </div>

  <div class="matches">

    <div class="card">
      <div class="live">EN DIRECTO</div>
      <h3>UFC Fight Night</h3>
      <p>21:00</p>
      <button>Ver</button>
    </div>

    <div class="card">
      <div>PRÓXIMO</div>
      <h3>Bellator Event</h3>
      <p>23:00</p>
      <button>Ver</button>
    </div>

    <div class="card">
      <div>PRÓXIMO</div>
      <h3>Local MMA Event</h3>
      <p>00:30</p>
      <button>Ver</button>
    </div>

  </div>

</div>

</body>
</html>
