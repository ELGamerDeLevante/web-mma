<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Neon Pro+</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:radial-gradient(circle,#0f0f0f,#000);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{text-align:center;}

h1{
    color:#00ff88;
    text-shadow:0 0 20px #00ff88;
}

.stats{
    display:flex;
    justify-content:center;
    gap:25px;
    margin:10px;
    font-size:20px;
}

canvas{
    background:#000;
    border:2px solid #00ff88;
    border-radius:15px;
    box-shadow:
        0 0 25px rgba(0,255,136,0.4),
        0 0 70px rgba(0,255,136,0.2);
    width:90vmin;
    height:90vmin;
}

button{
    margin-top:10px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{transform:scale(1.05);}

/* START */
#startScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#gameOverScreen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#gameOverScreen h1{
    color:red;
    font-size:50px;
    margin-bottom:20px;
}

.controls{
    display:none;
    margin-top:10px;
}

.controls button{
    width:70px;
    height:70px;
    margin:5px;
    font-size:22px;
}

@media(max-width:768px){
    .controls{display:block;}
}
</style>
</head>

<body>

<div id="startScreen">
    <h1>🐍 SNAKE PRO+</h1>
    <button onclick="startGame()">JUGAR</button>
</div>

<div id="gameOverScreen">
    <h1>💀 GAME OVER</h1>
    <div id="finalScore"></div>
    <button onclick="startGame()">REINTENTAR</button>
</div>

<div class="container">

    <h1>Snake Neon Pro+</h1>

    <div class="stats">
        <div>🏆 Score: <span id="score">0</span></div>
        <div>⭐ Récord: <span id="best">0</span></div>
    </div>

    <canvas id="game"></canvas>

    <button onclick="startGame()">Reiniciar</button>

    <div class="controls">
        <div><button onclick="setDir('up')">⬆️</button></div>
        <div>
            <button onclick="setDir('left')">⬅️</button>
            <button onclick="setDir('down')">⬇️</button>
            <button onclick="setDir('right')">➡️</button>
        </div>
    </div>

</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const gameOverScreen=document.getElementById("gameOverScreen");

let grid=20;
let size=25;

/* 🎮 ESTADO */
let snake,food,dx,dy,score,best;
let lastTime=0;
let accumulator=0;
let step=140;

best=localStorage.getItem("snakeBest")||0;
bestEl.innerText=best;

/* RESPONSIVE */
function resize(){
    let s=Math.min(window.innerWidth,window.innerHeight)*0.9;
    canvas.width=s;
    canvas.height=s;
    grid=canvas.width/size;
}
resize();
window.addEventListener("resize",resize);

/* START */
function startGame(){
document.getElementById("startScreen").style.display="none";
gameOverScreen.style.display="none";
reset();
requestAnimationFrame(loop);
}

/* RESET */
function reset(){
snake=[{x:10,y:10}];
dx=1;
dy=0;
score=0;
spawnFood();
update();
}

/* SCORE */
function update(){
scoreEl.innerText=score;

if(score>best){
best=score;
localStorage.setItem("snakeBest",best);
bestEl.innerText=best;
}
}

/* FOOD */
function spawnFood(){
food={
x:Math.floor(Math.random()*size),
y:Math.floor(Math.random()*size)
};
}

/* MOVIMIENTO (LOGICA) */
function move(){

let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};

snake.unshift(head);

if(head.x===food.x && head.y===food.y){
score++;
spawnFood();

if(step>70){
step-=2;
}
}else{
snake.pop();
}
}

/* COLISION */
function collision(){
let h=snake[0];
return (
h.x<0||h.y<0||h.x>=size||h.y>=size||
snake.slice(1).some(s=>s.x===h.x&&s.y===h.y)
);
}

/* LOOP FLUIDO */
function loop(time){

requestAnimationFrame(loop);

if(!lastTime) lastTime=time;

accumulator += time-lastTime;
lastTime=time;

while(accumulator>=step){

move();

if(collision()){
gameOverScreen.style.display="flex";
document.getElementById("finalScore").innerText="Score: "+score;
return;
}

accumulator-=step;
}

draw();
}

/* DIBUJO */
function draw(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* GRID SUAVE */
ctx.strokeStyle="rgba(255,255,255,0.06)";
for(let i=0;i<canvas.width;i+=grid){

ctx.beginPath();
ctx.moveTo(i,0);
ctx.lineTo(i,canvas.height);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0,i);
ctx.lineTo(canvas.width,i);
ctx.stroke();
}

/* FOOD */
let pulse=Math.sin(Date.now()/120)*2;

ctx.shadowBlur=25;
ctx.shadowColor="red";

ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(
food.x*grid+grid/2,
food.y*grid+grid/2,
8+pulse,
0,Math.PI*2
);
ctx.fill();

/* SNAKE */
snake.forEach((s,i)=>{

ctx.shadowBlur=15;
ctx.shadowColor="#00ff88";

ctx.fillStyle=i===0?"#00ff88":"#00cc66";

ctx.beginPath();
ctx.roundRect(
s.x*grid,
s.y*grid,
grid-2,
grid-2,
5
);
ctx.fill();

if(i===0){
ctx.shadowBlur=0;
ctx.fillStyle="black";
ctx.fillRect(s.x*grid+grid/3,s.y*grid+grid/3,3,3);
ctx.fillRect(s.x*grid+grid/1.6,s.y*grid+grid/3,3,3);
}
});

update();
}

/* CONTROL */
function setDir(d){
if(d==="up" && dy===0){dx=0;dy=-1;}
if(d==="down" && dy===0){dx=0;dy=1;}
if(d==="left" && dx===0){dx=-1;dy=0;}
if(d==="right" && dx===0){dx=1;dy=0;}
}

/* TECLADO */
document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp")setDir("up");
if(e.key==="ArrowDown")setDir("down");
if(e.key==="ArrowLeft")setDir("left");
if(e.key==="ArrowRight")setDir("right");
});

</script>

</body>
</html>
