<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Neon Pro+ RATS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:radial-gradient(circle,#0f0f0f,#000);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{text-align:center;}

h1{
    color:#00ff88;
    text-shadow:0 0 20px #00ff88;
}

.stats{
    display:flex;
    justify-content:center;
    gap:25px;
    margin:10px;
    font-size:20px;
}

canvas{
    background:#000;
    border:2px solid #00ff88;
    border-radius:15px;
    box-shadow:
        0 0 25px rgba(0,255,136,0.4),
        0 0 70px rgba(0,255,136,0.2);
    width:90vmin;
    height:90vmin;
}

button{
    margin-top:10px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{transform:scale(1.05);}

#startScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#gameOverScreen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#gameOverScreen h1{
    color:red;
    font-size:50px;
    margin-bottom:20px;
}

/* CONTROLES */
.controls{
    margin-top:10px;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:10px;
}

.controls .row{
    display:flex;
    gap:10px;
}

.controls button{
    width:65px;
    height:65px;
    font-size:22px;
    border-radius:12px;
    background:#00ff88;
    border:none;
    color:black;
    font-weight:bold;
}

@media (max-width:768px){
    .controls{ display:flex; }
}
</style>
</head>

<body>

<div id="startScreen">
    <h1>🐍 SNAKE PRO+ RATS</h1>
    <button onclick="startGame()">JUGAR</button>
</div>

<div id="gameOverScreen">
    <h1>💀 GAME OVER</h1>
    <div id="finalScore"></div>
    <button onclick="startGame()">REINTENTAR</button>
</div>

<div class="container">

<h1>Snake Neon Pro+</h1>

<div class="stats">
    <div>🏆 Score: <span id="score">0</span></div>
    <div>⭐ Récord: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<button onclick="startGame()">Reiniciar</button>

<div class="controls">
    <div class="row">
        <button onclick="setDir('up')">⬆️</button>
    </div>
    <div class="row">
        <button onclick="setDir('left')">⬅️</button>
        <button onclick="setDir('down')">⬇️</button>
        <button onclick="setDir('right')">➡️</button>
    </div>
</div>

</div>

<script>

/* CANVAS */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const gameOverScreen=document.getElementById("gameOverScreen");
const finalScore=document.getElementById("finalScore");

let grid=20;
let size=25;

/* STATE */
let snake,food,rat,dx,dy,score,best;
let lastTime=0;
let acc=0;
let step=140;

/* 🎵 SONIDOS */
let eatSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8a4d2f6b7.mp3?filename=apple-bite-crunch-1-6923.mp3");
let ratSound = new Audio("https://cdn.pixabay.com/download/audio/2021/09/06/audio_5c8f6c9d2b.mp3?filename=coin-collect-retro-100632.mp3");

/* BEST */
best=localStorage.getItem("snakeBest")||0;
bestEl.innerText=best;

/* RESIZE */
function resize(){
let s=Math.min(innerWidth,innerHeight)*0.9;
canvas.width=s;
canvas.height=s;
grid=canvas.width/size;
}
resize();
addEventListener("resize",resize);

/* START */
function startGame(){
document.getElementById("startScreen").style.display="none";
gameOverScreen.style.display="none";
reset();
requestAnimationFrame(loop);
}

/* RESET */
function reset(){
snake=[{x:10,y:10}];
dx=1; dy=0;
score=0;
step=140;

spawnFood();
spawnRat();

update();
}

/* FOOD */
function spawnFood(){
food={x:Math.floor(Math.random()*size),y:Math.floor(Math.random()*size)};
}

/* RAT */
function spawnRat(){
rat=null;
if(Math.random()<0.35){
rat={x:Math.floor(Math.random()*size),y:Math.floor(Math.random()*size)};
}
}

/* SCORE */
function update(){
scoreEl.innerText=score;

if(score>best){
best=score;
localStorage.setItem("snakeBest",best);
bestEl.innerText=best;
}
}

/* ====== 🔥 CONTROL FIX ====== */
let nextDir = {x:1,y:0};

function setDir(d){
if(d==="up" && dy===0) nextDir={x:0,y:-1};
if(d==="down" && dy===0) nextDir={x:0,y:1};
if(d==="left" && dx===0) nextDir={x:-1,y:0};
if(d==="right" && dx===0) nextDir={x:1,y:0};
}

function applyDir(){
dx = nextDir.x;
dy = nextDir.y;
}

/* KEYBOARD */
addEventListener("keydown",e=>{
if(e.key==="ArrowUp")setDir("up");
if(e.key==="ArrowDown")setDir("down");
if(e.key==="ArrowLeft")setDir("left");
if(e.key==="ArrowRight")setDir("right");
});

/* MOVE */
function move(){

let h={x:snake[0].x+dx,y:snake[0].y+dy};
snake.unshift(h);

if(h.x===food.x&&h.y===food.y){
score++;
eatSound.currentTime=0;
eatSound.play().catch(()=>{});
spawnFood();
spawnRat();
if(step>70) step-=1.2;
}
else if(rat&&h.x===rat.x&&h.y===rat.y){
score+=3;
ratSound.currentTime=0;
ratSound.play().catch(()=>{});
spawnRat();
}
else snake.pop();
}

/* CRASH */
function crash(){
let h=snake[0];
return h.x<0||h.y<0||h.x>=size||h.y>=size||
snake.slice(1).some(s=>s.x===h.x&&s.y===h.y);
}

/* LOOP */
function loop(time){
requestAnimationFrame(loop);

if(!lastTime) lastTime=time;

acc+=time-lastTime;
lastTime=time;

while(acc>=step){

applyDir();   // 🔥 FIX IMPORTANTE
move();

if(crash()){
finalScore.innerText="Score: "+score;
gameOverScreen.style.display="flex";
return;
}

acc-=step;
}

draw();
}

/* DRAW */
function draw(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="rgba(255,255,255,0.06)";
for(let i=0;i<canvas.width;i+=grid){
ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
}

let pulse=Math.sin(Date.now()/120)*2;

ctx.shadowBlur=20;
ctx.shadowColor="red";
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(food.x*grid+grid/2,food.y*grid+grid/2,8+pulse,0,Math.PI*2);
ctx.fill();

if(rat){
ctx.shadowBlur=10;
ctx.shadowColor="#aaa";
ctx.fillStyle="#bbb";
ctx.beginPath();
ctx.arc(rat.x*grid+grid/2,rat.y*grid+grid/2,6+pulse,0,Math.PI*2);
ctx.fill();
}

snake.forEach((s,i)=>{
ctx.shadowBlur=12;
ctx.shadowColor="#00ff88";
ctx.fillStyle=i===0?"#00ff88":"#00cc66";
ctx.beginPath();
ctx.roundRect(s.x*grid,s.y*grid,grid-2,grid-2,5);
ctx.fill();
});

update();
}

</script>

</body>
</html>
