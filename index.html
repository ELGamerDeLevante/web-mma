<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElGamerDeLevante | MMA Live</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
}

/* LIVE BAR */
.livebar {
  text-align: center;
  padding: 10px;
  background: red;
  font-weight: bold;
}

/* BUTTONS */
.fighters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  padding: 20px;
}

button.card {
  background: #111;
  color: white;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
  cursor: pointer;
  font-size: 16px;
}

button.card:hover {
  border-color: red;
}

/* PLAYER */
.player {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 10px 20px;
}

iframe {
  width: 100%;
  max-width: 900px;
  height: 450px;
  border: 2px solid red;
  border-radius: 10px;
  background: black;
}

/* CHAT */
.chat {
  margin: 20px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
}

#messages {
  height: 200px;
  overflow-y: auto;
  background: black;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #222;
}

input {
  padding: 5px;
}

/* LEGAL */
.legal-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  border: none;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
}

#legalModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
}

.modal-box {
  background: #111;
  max-width: 600px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>
  EL GAMER DE <span style="color:red;">LEVANTE</span>
</header>

<div class="livebar">🔴 MMA LIVE</div>



<!-- BOTONES -->
<div class="fighters">
  <button class="card" onclick="loadStream('UFC')">UFC</button>
  <button class="card" onclick="loadStream('PFL')">PFL</button>
  <button class="card" onclick="loadStream('WOW')">WOW</button>
  <button class="card" onclick="loadStream('WAR')">WAR</button>
</div>

<!-- CHAT -->
<div class="chat">
  <h3>Chat en vivo</h3>
  <div id="messages"></div>
  <input id="name" placeholder="Nombre">
  <input id="message" placeholder="Mensaje">
  <button onclick="sendMessage()">Enviar</button>
</div>

<!-- LEGAL -->
<button class="legal-btn" onclick="openLegal()">Aviso Legal</button>

<div id="legalModal">
  <div class="modal-box">
    <h2 style="color:red;">Aviso Legal</h2>
    <p>Este sitio no aloja contenido, solo muestra reproductor interno.</p>
    <button onclick="closeLegal()" style="background:red;color:white;padding:10px;border:none;border-radius:6px;">
      Cerrar
    </button>
  </div>
</div>

<script>
/* STREAMS (SIN YOUTUBE) */
const streams = {
  UFC: "https://example.com/stream1",
  PFL: "https://example.com/stream2",
  WOW: "https://example.com/stream3",
  WAR: "https://example.com/stream4"
};

function loadStream(channel) {
  document.getElementById("player").src = streams[channel] || "";
}

/* CHAT */
const firebaseURL = "https://elgamerdelevante-chat-default-rtdb.europe-west1.firebasedatabase.app/";

function loadMessages() {
  fetch(firebaseURL + "/messages.json")
    .then(res => res.json())
    .then(data => {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      if (!data) return;

      Object.values(data).forEach(m => {
        box.innerHTML += `<p><b style="color:red">${m.name}:</b> ${m.text}</p>`;
      });

      box.scrollTop = box.scrollHeight;
    });
}

function sendMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) return;

  fetch(firebaseURL + "/messages.json", {
    method: "POST",
    body: JSON.stringify({ name, text: message })
  });

  document.getElementById("message").value = "";
}

setInterval(loadMessages, 2000);
loadMessages();

/* LEGAL */
function openLegal() {
  document.getElementById("legalModal").style.display = "block";
}

function closeLegal() {
  document.getElementById("legalModal").style.display = "none";
}
</script>

</body>
</html>
