<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Neon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:radial-gradient(circle,#141414,#050505);
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:#00ff88;
    text-shadow:0 0 20px #00ff88;
    margin-bottom:10px;
}

.stats{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-bottom:15px;
    font-size:20px;
}

canvas{
    background:#000;
    border:2px solid #00ff88;
    border-radius:15px;
    box-shadow:
        0 0 20px #00ff88,
        0 0 50px #00ff88;
    max-width:95vw;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    color:black;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    transform:scale(1.05);
}

#startScreen{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#startScreen h1{
    font-size:50px;
}

#gameOver{
    display:none;
    margin-top:10px;
    color:#ff4444;
    font-size:22px;
    font-weight:bold;
}

.controls{
    margin-top:20px;
    display:none;
}

.controls button{
    width:70px;
    height:70px;
    margin:5px;
    font-size:25px;
}

@media(max-width:768px){
    .controls{
        display:block;
    }
}
</style>
</head>
<body>

<div id="startScreen">
    <h1>🐍 SNAKE NEON</h1>
    <p style="margin:20px;">Come manzanas y supera tu récord.</p>
    <button onclick="startGame()">JUGAR</button>
</div>

<div class="container">

    <h1>🐍 Snake Neon</h1>

    <div class="stats">
        <div>🏆 <span id="score">0</span></div>
        <div>⭐ Récord: <span id="best">0</span></div>
    </div>

    <canvas id="game" width="500" height="500"></canvas>

    <div id="gameOver">GAME OVER</div>

    <button onclick="resetGame()">Reiniciar</button>

    <div class="controls">
        <div>
            <button onclick="setDirection('up')">⬆️</button>
        </div>
        <div>
            <button onclick="setDirection('left')">⬅️</button>
            <button onclick="setDirection('down')">⬇️</button>
            <button onclick="setDirection('right')">➡️</button>
        </div>
    </div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const gameOverEl = document.getElementById("gameOver");

const grid = 20;
const tiles = canvas.width / grid;

let snake;
let food;
let dx;
let dy;
let score;
let speed;
let gameLoop;

let best = localStorage.getItem("snakeBest") || 0;
bestEl.textContent = best;

function startGame(){
    document.getElementById("startScreen").style.display="none";
    resetGame();
}

function resetGame(){

    snake=[{x:10,y:10}];

    dx=1;
    dy=0;

    score=0;
    speed=120;

    gameOverEl.style.display="none";

    generateFood();

    clearInterval(gameLoop);
    gameLoop=setInterval(drawGame,speed);

    updateScore();
}

function updateScore(){

    scoreEl.textContent=score;

    if(score>best){
        best=score;
        localStorage.setItem("snakeBest",best);
        bestEl.textContent=best;
    }
}

function generateFood(){

    food={
        x:Math.floor(Math.random()*tiles),
        y:Math.floor(Math.random()*tiles)
    };
}

function moveSnake(){

    const head={
        x:snake[0].x+dx,
        y:snake[0].y+dy
    };

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){

        score++;

        updateScore();

        generateFood();

        if(speed>60){

            speed-=3;

            clearInterval(gameLoop);
            gameLoop=setInterval(drawGame,speed);
        }

    }else{
        snake.pop();
    }
}

function collision(){

    const head=snake[0];

    if(
        head.x<0 ||
        head.y<0 ||
        head.x>=tiles ||
        head.y>=tiles
    ){
        return true;
    }

    for(let i=1;i<snake.length;i++){

        if(
            head.x===snake[i].x &&
            head.y===snake[i].y
        ){
            return true;
        }
    }

    return false;
}

function drawGame(){

    moveSnake();

    if(collision()){

        clearInterval(gameLoop);

        gameOverEl.style.display="block";

        return;
    }

    ctx.fillStyle="#050505";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="#111";

    for(let i=0;i<canvas.width;i+=grid){

        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,i);
        ctx.lineTo(canvas.width,i);
        ctx.stroke();
    }

    ctx.shadowBlur=20;
    ctx.shadowColor="#ff3333";

    ctx.fillStyle="#ff3333";

    ctx.beginPath();
    ctx.arc(
        food.x*grid+10,
        food.y*grid+10,
        8,
        0,
        Math.PI*2
    );
    ctx.fill();

    snake.forEach((segment,index)=>{

        ctx.shadowBlur=15;
        ctx.shadowColor="#00ff88";

        if(index===0){

            ctx.fillStyle="#00ff88";

            ctx.beginPath();
            ctx.roundRect(
                segment.x*grid,
                segment.y*grid,
                18,
                18,
                5
            );
            ctx.fill();

            ctx.shadowBlur=0;

            ctx.fillStyle="black";

            ctx.beginPath();
            ctx.arc(segment.x*grid+6,segment.y*grid+7,2,0,Math.PI*2);
            ctx.arc(segment.x*grid+13,segment.y*grid+7,2,0,Math.PI*2);
            ctx.fill();

        }else{

            ctx.fillStyle="#00cc66";

            ctx.beginPath();
            ctx.roundRect(
                segment.x*grid,
                segment.y*grid,
                18,
                18,
                4
            );
            ctx.fill();
        }
    });

}

function setDirection(dir){

    if(dir==="up" && dy===0){
        dx=0;dy=-1;
    }

    if(dir==="down" && dy===0){
        dx=0;dy=1;
    }

    if(dir==="left" && dx===0){
        dx=-1;dy=0;
    }

    if(dir==="right" && dx===0){
        dx=1;dy=0;
    }
}

document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowUp") setDirection("up");
    if(e.key==="ArrowDown") setDirection("down");
    if(e.key==="ArrowLeft") setDirection("left");
    if(e.key==="ArrowRight") setDirection("right");
});

</script>

</body>
</html>
