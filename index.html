<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL GAMER DE LEVANTE | MMA LIVE</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
}

.livebar {
  text-align: center;
  padding: 10px;
  background: red;
  font-weight: bold;
}

.chat {
  margin: 20px auto;
  background: #111;
  padding: 15px;
  border-radius: 10px;
  width: calc(100% - 40px);
  max-width: 500px;
  box-sizing: border-box;
}

#messages {
  height: 220px;
  overflow-y: auto;
  background: black;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #222;
  border-radius: 8px;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #333;
  background: #000;
  color: white;
  box-sizing: border-box;
}

.msg-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

#message {
  flex: 1;
}

button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: red;
  color: white;
  cursor: pointer;
}

.chat-stats {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #aaa;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  EL GAMER DE <span style="color:red;">LEVANTE</span>
</header>

<div class="livebar">
  🔴 EL GAMER DE LEVANTE / MMA LIVE
</div>

<div style="text-align:center; padding:15px; color:#aaa;">
  Próximos eventos de MMA en directo 
</div>
<div class="chat">

  <h3>💬 Chat en vivo</h3>

  <div class="chat-stats">
    <div>👀 Espectadores: <span id="viewers">0</span></div>
    <div>👥 Miembros: <span id="membersCount">0</span></div>
  </div>

  <div id="messages"></div>

  <input id="name" placeholder="Nombre">

  <div class="msg-row">
    <input id="message" placeholder="Mensaje">
    <button onclick="sendMessage()">Enviar</button>
  </div>

</div>

<script>
/* =========================
   🔥 FIREBASE INIT
========================= */
const firebaseConfig = {
  databaseURL: "https://elgamerdelevante-chat-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ID único */
const userId = Math.random().toString(36).substr(2, 9);

/* =========================
   💬 CHAT OPTIMIZADO
========================= */
const messagesRef = db.ref("messages");

/* SOLO NUEVOS MENSAJES (NO RECARGA TODO) */
messagesRef.on("child_added", (snap) => {
  const m = snap.val();
  const box = document.getElementById("messages");

  const div = document.createElement("div");
  div.style.marginBottom = "8px";
  div.innerHTML = `<b style="color:red">${m.name}:</b> ${m.text}`;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
});

function sendMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) return;

  messagesRef.push({
    name,
    text: message,
    time: Date.now()
  });

  document.getElementById("message").value = "";
}

/* =========================
   👀 ESPECTADORES REALES
========================= */
const viewersRef = db.ref("viewers");

viewersRef.child(userId).set(true);
viewersRef.child(userId).onDisconnect().remove();

viewersRef.on("value", (snap) => {
  const data = snap.val();
  document.getElementById("viewers").innerText =
    data ? Object.keys(data).length : 0;
});

/* =========================
   👥 MIEMBROS REALES
========================= */
const membersRef = db.ref("members");

let username = "";

document.getElementById("name").addEventListener("change", (e) => {
  username = e.target.value;

  membersRef.child(userId).set({
    name: username
  });
});

membersRef.child(userId).onDisconnect().remove();

membersRef.on("value", (snap) => {
  const data = snap.val();
  document.getElementById("membersCount").innerText =
    data ? Object.keys(data).length : 0;
});
</script>

</body>
</html>
