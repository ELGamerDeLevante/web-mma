<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElGamerDeLevante | MMA Live</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* BANNER */
.hero-banner {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, #111, black);
  padding: 30px;
  border-bottom: 2px solid #222;
}

.center-content {
  text-align: center;
}

.center-content h1 {
  font-size: 42px;
  margin-top: 20px;
  color: white;
  letter-spacing: 3px;
}

.center-content p {
  color: red;
  font-weight: bold;
}

.octagon {
  width: 140px;
  height: 140px;
  background: #111;
  border: 4px solid red;
  clip-path: polygon(
    30% 0%, 70% 0%,
    100% 30%, 100% 70%,
    70% 100%, 30% 100%,
    0% 70%, 0% 30%
  );
  margin: auto;
  box-shadow: 0 0 25px red;
}

.fighter img {
  height: 260px;
  object-fit: contain;
  filter: drop-shadow(0 0 10px red);
}

/* LIVE BAR */
.livebar {
  text-align: center;
  padding: 10px;
  background: red;
  font-weight: bold;
}

/* CARDS */
.fighters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
}

.card:hover {
  border-color: red;
  transform: scale(1.05);
  transition: 0.3s;
}

.tag {
  color: red;
  font-size: 12px;
}

/* CHAT */
.container {
  padding: 20px;
}

.chat {
  background: #111;
  padding: 15px;
  border-radius: 10px;
}

#messages {
  height: 200px;
  overflow: auto;
  background: black;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #222;
}

input {
  padding: 5px;
}
</style>

</head>

<body>

<!-- BANNER -->
<div style="text-align:center; padding:20px; font-size:32px; font-weight:bold;">
  EL GAMER DE <span style="color:red;">LEVANTE</span>
</div>


<!-- LIVE -->
<div class="livebar">
  🔴 MMA LIVE - UFC / MMA STREAMING
</div>

<!-- CANALES -->
<div class="fighters">

  <div class="card">
    <div class="tag">CANAL</div>
    <h3>UFC</h3>
    <p>Ultimate Fighting Championship</p>
  </div>

  <div class="card">
    <div class="tag">CANAL</div>
    <h3>PFL</h3>
    <p>Professional Fighters League</p>
  </div>

  <div class="card">
    <div class="tag">CANAL</div>
    <h3>WOW</h3>
    <p>Women of Wrestling</p>
  </div>

  <div class="card">
    <div class="tag">CANAL</div>
    <h3>WAR</h3>
    <p>Combat Sports</p>
  </div>

</div>

<!-- CHAT -->
<div class="container">

  <div class="chat">
    <h3>💬 Chat en vivo</h3>

    <div id="messages"></div>

    <input id="name" placeholder="Nombre">
    <input id="message" placeholder="Mensaje">
    <button onclick="sendMessage()">Enviar</button>
  </div>

</div>

<!-- SCRIPT FIREBASE -->
<script>
const firebaseURL = "https://elgamerdelevante-chat-default-rtdb.europe-west1.firebasedatabase.app/";

function loadMessages() {
  fetch(firebaseURL + "/messages.json")
    .then(res => res.json())
    .then(data => {
      const box = document.getElementById("messages");

      if (!data) {
        box.innerHTML = "<p>No hay mensajes aún</p>";
        return;
      }

      box.innerHTML = "";

      for (let id in data) {
        box.innerHTML += `<p><b>${data[id].name}:</b> ${data[id].text}</p>`;
      }
    });
}

function sendMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  fetch(firebaseURL + "/messages.json", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      text: message
    })
  });

  document.getElementById("message").value = "";
}

setInterval(loadMessages, 2000);
</script>

</body>
</html>
